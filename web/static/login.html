<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storage Expert — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif; background: #1e1e2e; color: #cdd6f4;
      display: flex; align-items: center; justify-content: center; height: 100vh;
    }
    .card {
      background: #313244; border-radius: 12px; padding: 40px 36px;
      width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 20px;
    }
    h1 { font-size: 20px; font-weight: 700; color: #cdd6f4; text-align: center; }
    .subtitle { font-size: 13px; color: #6c7086; text-align: center; margin-top: -12px; }
    label { font-size: 13px; color: #a6adc8; display: block; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px 12px; background: #1e1e2e; border: 1px solid #45475a;
      border-radius: 6px; color: #cdd6f4; font-size: 14px; outline: none;
    }
    input[type="text"]:focus, input[type="password"]:focus { border-color: #89b4fa; }
    button[type="submit"] {
      width: 100%; padding: 11px; background: #89b4fa; color: #1e1e2e;
      border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    button[type="submit"]:hover { background: #74c7ec; }
    .error {
      background: #f38ba822; border: 1px solid #f38ba8; border-radius: 6px;
      padding: 10px 12px; font-size: 13px; color: #f38ba8; text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Storage Expert</h1>
    <p class="subtitle">Sign in to continue</p>

    <div id="error-msg" class="error" style="display:none">Invalid username or password.</div>

    <form method="POST" action="/login">
      <div style="margin-bottom:16px">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" autofocus required />
      </div>
      <div style="margin-bottom:20px">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button type="submit">Sign in</button>
    </form>
  </div>

  <script>
    if (new URLSearchParams(window.location.search).get('error')) {
      document.getElementById('error-msg').style.display = 'block';
    }
  </script>
</body>
</html>
