<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storage Expert — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif; background: #00402b; color: #1c2a23;
      display: flex; align-items: center; justify-content: center; height: 100vh;
    }
    .card {
      background: #fff; border-radius: 12px; padding: 40px 36px;
      width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 20px;
      border-top: 4px solid #00915a;
    }
    h1 { font-size: 20px; font-weight: 700; color: #00402b; text-align: center; }
    .subtitle { font-size: 13px; color: #6b8578; text-align: center; margin-top: -12px; }
    label { font-size: 13px; color: #4a5f55; display: block; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px 12px; background: #fff; border: 1px solid #c9dad1;
      border-radius: 6px; color: #1c2a23; font-size: 14px; outline: none;
    }
    input[type="text"]:focus, input[type="password"]:focus { border-color: #00915a; }
    button[type="submit"] {
      width: 100%; padding: 11px; background: #00915a; color: #fff;
      border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    button[type="submit"]:hover { background: #007449; }
    .error {
      background: #fdedef; border: 1px solid #e4526a; border-radius: 6px;
      padding: 10px 12px; font-size: 13px; color: #c6344b; text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Storage Expert</h1>
    <p class="subtitle">Sign in to continue</p>

    <div id="error-msg" class="error" style="display:none">Invalid username or password.</div>

    <form method="POST" action="/login">
      <div style="margin-bottom:16px">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" autofocus required />
      </div>
      <div style="margin-bottom:20px">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button type="submit">Sign in</button>
    </form>
  </div>

  <script>
    if (new URLSearchParams(window.location.search).get('error')) {
      document.getElementById('error-msg').style.display = 'block';
    }
  </script>
</body>
</html>
