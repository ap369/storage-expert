<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storage Expert</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; display: flex; height: 100vh; background: #f5f5f5; }

    /* Sidebar */
    #sidebar {
      width: 260px; background: #1e1e2e; color: #cdd6f4;
      display: flex; flex-direction: column; padding: 16px; gap: 12px; flex-shrink: 0;
    }
    #sidebar h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: #89b4fa; }
    #add-btn {
      background: #89b4fa; color: #1e1e2e; border: none; border-radius: 6px;
      padding: 8px 12px; cursor: pointer; font-size: 13px; font-weight: 600; text-align: left;
    }
    #add-btn:hover { background: #74c7ec; }
    #file-input { display: none; }
    #doc-list { list-style: none; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; max-height: 40%; }
    #doc-list li {
      font-size: 12px; padding: 6px 8px; border-radius: 4px;
      background: #313244; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #upload-status { font-size: 11px; color: #a6e3a1; min-height: 16px; }

    /* MCP Servers section */
    #mcp-section { display: flex; flex-direction: column; gap: 6px; }
    #mcp-section.hidden { display: none; }
    #mcp-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    #mcp-list li {
      font-size: 12px; padding: 6px 8px; border-radius: 4px;
      background: #313244; display: flex; align-items: center; gap: 6px;
    }
    .mcp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .mcp-dot.online  { background: #a6e3a1; }
    .mcp-dot.offline { background: #f38ba8; }
    .mcp-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mcp-meta { font-size: 10px; color: #6c7086; white-space: nowrap; }

    /* Main chat area */
    #main { flex: 1; display: flex; flex-direction: column; }
    #header { padding: 16px 20px; background: #fff; border-bottom: 1px solid #e0e0e0; font-weight: 600; font-size: 16px; }
    #messages { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

    .msg { max-width: 75%; min-width: 0; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: 14px; word-break: break-word; }
    .msg.user { align-self: flex-end; background: #89b4fa; color: #1e1e2e; border-bottom-right-radius: 4px; }
    .msg.assistant { align-self: flex-start; background: #fff; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
    .sources { font-size: 11px; color: #888; margin-top: 6px; }

    #input-bar { display: flex; gap: 8px; padding: 16px 20px; background: #fff; border-top: 1px solid #e0e0e0; }
    #msg-input {
      flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; outline: none;
    }
    #msg-input:focus { border-color: #89b4fa; }
    #send-btn {
      background: #89b4fa; color: #1e1e2e; border: none; border-radius: 8px;
      padding: 10px 18px; cursor: pointer; font-weight: 600; font-size: 14px;
    }
    #send-btn:hover { background: #74c7ec; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }

    /* Typing indicator */
    .typing { display: flex; align-items: center; gap: 4px; padding: 12px 16px; }
    .typing span {
      width: 7px; height: 7px; background: #aaa; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* Upload spinner */
    #add-btn.loading { opacity: 0.6; cursor: not-allowed; pointer-events: none; }
    #upload-status.uploading::before {
      content: '';
      display: inline-block; width: 9px; height: 9px;
      border: 2px solid #a6e3a1; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 5px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Markdown code rendering */
    .msg.assistant pre {
      background: #1e1e2e; color: #cdd6f4; border-radius: 6px;
      padding: 10px 14px; overflow-x: auto; margin: 8px 0; font-size: 13px;
      max-width: 100%;
    }
    .msg.assistant code {
      background: #e8e8f0; border-radius: 3px; padding: 1px 5px; font-size: 13px;
    }
    .msg.assistant pre code { background: none; padding: 0; }
    .msg.assistant p { margin: 4px 0; }
    .msg.assistant ul, .msg.assistant ol { padding-left: 20px; margin: 4px 0; }
  </style>
</head>
<body>

<div id="sidebar">
  <h2>Knowledge Base</h2>
  <button id="add-btn">+ Add PDF</button>
  <input type="file" id="file-input" accept=".pdf" />
  <div id="upload-status"></div>
  <ul id="doc-list"></ul>

  <div id="mcp-section" class="hidden">
    <h2>MCP Servers</h2>
    <ul id="mcp-list"></ul>
  </div>
</div>

<div id="main">
  <div id="header">Storage Expert</div>
  <div id="messages"></div>
  <div id="input-bar">
    <input id="msg-input" type="text" placeholder="Ask about your storage systems…" />
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
  function uuid() {
    if (typeof crypto.randomUUID === 'function') return crypto.randomUUID();
    return '10000000-1000-4000-8000-100000000000'.replace(/[018]/g, c =>
      (+c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> +c / 4).toString(16)
    );
  }
  const sessionId = sessionStorage.getItem('session_id') || uuid();
  sessionStorage.setItem('session_id', sessionId);

  async function loadDocuments() {
    const res = await fetch('/documents');
    const data = await res.json();
    const list = document.getElementById('doc-list');
    list.innerHTML = '';
    data.documents.forEach(name => {
      const li = document.createElement('li');
      li.textContent = name;
      li.title = name;
      list.appendChild(li);
    });
  }

  document.getElementById('add-btn').addEventListener('click', () => {
    document.getElementById('file-input').click();
  });

  document.getElementById('file-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const status = document.getElementById('upload-status');
    const addBtn = document.getElementById('add-btn');

    status.textContent = 'Uploading…';
    status.className = 'uploading';
    addBtn.classList.add('loading');

    const form = new FormData();
    form.append('file', file);
    try {
      const res = await fetch('/ingest', { method: 'POST', body: form });
      const data = await res.json();
      if (res.ok) {
        status.textContent = data.chunks_stored > 0
          ? `Stored ${data.chunks_stored} chunks`
          : `Already ingested`;
        await loadDocuments();
      } else {
        status.textContent = `Error: ${data.detail}`;
      }
    } catch {
      status.textContent = 'Upload failed';
    }
    status.className = '';
    addBtn.classList.remove('loading');
    e.target.value = '';
  });

  function appendMessage(role, text, sources) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (role === 'assistant') {
      div.innerHTML = marked.parse(text);
    } else {
      div.textContent = text;
    }
    if (sources && sources.length > 0) {
      const s = document.createElement('div');
      s.className = 'sources';
      s.textContent = 'Sources: ' + sources.join(' | ');
      div.appendChild(s);
    }
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg assistant typing';
    div.id = 'typing-indicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const btn = document.getElementById('send-btn');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    btn.disabled = true;
    appendMessage('user', message);
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, session_id: sessionId }),
      });
      const data = await res.json();
      removeTyping();
      appendMessage('assistant', data.answer, data.sources);
    } catch {
      removeTyping();
      appendMessage('assistant', 'Error: could not reach the server.');
    }
    btn.disabled = false;
    input.focus();
  }

  document.getElementById('send-btn').addEventListener('click', sendMessage);
  document.getElementById('msg-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  async function loadMcpServers() {
    try {
      const res = await fetch('/mcp-servers');
      const { servers } = await res.json();
      const section = document.getElementById('mcp-section');
      const list = document.getElementById('mcp-list');
      if (!servers.length) { section.classList.add('hidden'); return; }
      section.classList.remove('hidden');
      list.innerHTML = '';
      servers.forEach(s => {
        const li = document.createElement('li');
        const dot = document.createElement('span');
        dot.className = 'mcp-dot ' + (s.online ? 'online' : 'offline');
        const name = document.createElement('span');
        name.className = 'mcp-name';
        name.textContent = s.name;
        name.title = s.name;
        const meta = document.createElement('span');
        meta.className = 'mcp-meta';
        meta.textContent = s.online ? `${s.tool_count} tools` : 'offline';
        li.append(dot, name, meta);
        list.appendChild(li);
      });
    } catch { /* server unreachable — leave section hidden */ }
  }

  loadDocuments();
  loadMcpServers();
  setInterval(loadMcpServers, 30000);
</script>
</body>
</html>
